<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Trmeric · Demand Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FFA426; --orange-deep:#F89622; --orange-dark:#E67E10; --orange-subtle:#FFF8F0;
  --n900:#1a1a1a; --n800:#333; --n700:#444; --n600:#666; --n500:#777; --n400:#999;
  --n300:#bbb; --n200:#e5e5e5; --n150:#eef0f3; --n100:#f4f5f7; --n50:#fafafa; --white:#fff;
  --success:#10b981; --success-bg:#eaf7ef;
  --error:#e5484d;   --error-bg:#fdecec;
  --warning:#d08a00; --warning-bg:#fff4e6;
  --info:#3b82f6;    --info-bg:#eff6ff;
  --purple:#8b5cf6;  --purple-bg:#f5f3ff;
  --gradient-ai:linear-gradient(135deg,#8b5cf6 0%,#FFA426 100%);
  --r-sm:4px; --r-md:6px; --r-base:8px; --r-lg:12px; --r-xl:16px; --r-2xl:20px; --r-full:9999px;
  --sh-1:0 1px 3px rgba(20,24,40,.06); --sh-2:0 2px 8px rgba(20,24,40,.06);
  --sh-3:0 4px 14px rgba(20,24,40,.08); --sh-4:0 16px 44px rgba(20,24,40,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:'Poppins',-apple-system,'Segoe UI',sans-serif;background:var(--n150);color:var(--n900);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:3px;}
.hidden{display:none !important;}

/* ── app bar ── */
.appbar{height:58px;background:var(--white);border-bottom:1px solid var(--n200);display:flex;align-items:center;
  padding:0 22px;position:sticky;top:0;z-index:40;gap:18px;}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;}
.brand svg{width:24px;height:24px;}
.appbar .titlemid{font-size:13px;font-weight:600;color:var(--n500);margin-left:6px;}
.ab-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.ab-ico{width:36px;height:36px;border-radius:var(--r-full);border:none;background:transparent;color:var(--n600);display:grid;place-items:center;cursor:pointer;transition:background .15s;}
.ab-ico:hover{background:var(--n100);}
.ab-ico svg{width:19px;height:19px;}
.ab-avatar{width:34px;height:34px;border-radius:50%;background:#cfe3f6;color:var(--n900);display:grid;place-items:center;font-weight:700;font-size:12px;cursor:pointer;}
.tango-launch{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;color:#fff;font-weight:700;font-size:12.5px;
  padding:8px 15px;border-radius:var(--r-full);background:var(--gradient-ai);box-shadow:0 3px 12px rgba(139,92,246,.32);transition:transform .15s,box-shadow .15s;}
.tango-launch:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(139,92,246,.4);}
.tango-launch svg{width:15px;height:15px;}

/* ── layout ── */
.shell{display:flex;min-height:calc(100vh - 58px);}
.rail{width:56px;background:var(--white);border-right:1px solid var(--n200);display:flex;flex-direction:column;align-items:center;
  padding:16px 0;gap:8px;flex-shrink:0;}
.rail button{width:40px;height:40px;border-radius:var(--r-lg);border:none;background:transparent;color:var(--n500);display:grid;place-items:center;cursor:pointer;transition:all .15s;position:relative;}
.rail button:hover{background:var(--n100);color:var(--n800);}
.rail button.on{background:var(--orange-subtle);color:var(--orange-dark);}
.rail button svg{width:20px;height:20px;}
.rail .tg{background:var(--gradient-ai);color:#fff;}
.rail .tg:hover{filter:brightness(1.05);color:#fff;}
.main{flex:1;min-width:0;padding:26px 32px 60px;max-width:1320px;margin:0 auto;width:100%;}

/* ── toolbar ── */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.toolbar h1{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:0;}
.toolbar .sub{font-size:12px;color:var(--n500);margin-left:2px;}
.toolbar .sp{flex:1;}
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:12.5px;border-radius:var(--r-full);padding:9px 16px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange);}
.btn-primary:hover{background:var(--orange-deep);}
.btn-secondary{background:var(--white);color:var(--n700);border-color:var(--n200);}
.btn-secondary:hover{border-color:var(--n300);background:var(--n50);}
.btn-ghost{background:transparent;color:var(--n600);}
.btn-ghost:hover{background:var(--n100);}

/* ── chips ── */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);white-space:nowrap;}
.chip .dot{width:6px;height:6px;border-radius:50%;}
.c-high{background:var(--error-bg);color:var(--error);}
.c-med{background:var(--warning-bg);color:var(--warning);}
.c-low{background:var(--success-bg);color:var(--success);}
.c-todo{background:var(--info-bg);color:var(--info);}
.c-prog{background:var(--warning-bg);color:var(--warning);}
.c-done{background:var(--success-bg);color:var(--success);}
.c-section{background:var(--n100);color:var(--n600);font-weight:600;}
.c-incomplete{background:var(--n100);color:var(--n400);}
.c-action{background:var(--warning-bg);color:var(--warning);}
.c-pending{background:var(--n150);color:var(--n700);}
.c-reviewed{background:var(--success-bg);color:var(--success);}
.c-complete{background:var(--success-bg);color:var(--success);}

/* ── avatars ── */
.av{display:inline-flex;align-items:center;gap:7px;}
.av .ring{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:var(--n900);flex-shrink:0;}
.av .nm{font-size:12.5px;color:var(--n700);white-space:nowrap;}
.av.un .nm{color:var(--n400);}

/* ── demand card (Grid) ── */
.dcard{background:var(--white);border:1px solid var(--n200);border-radius:var(--r-2xl);box-shadow:var(--sh-2);margin-bottom:14px;transition:box-shadow .2s,border-color .2s;}
.dcard:hover{box-shadow:var(--sh-3);}
.dcard-head{padding:16px 20px;display:flex;align-items:flex-start;gap:16px;}
.dc-ref{font-size:10.5px;color:var(--n400);font-weight:600;letter-spacing:.02em;}
.dc-title{font-size:16px;font-weight:600;letter-spacing:-.01em;cursor:pointer;color:var(--n900);}
.dc-title:hover{color:var(--orange-dark);}
.dc-headmain{flex:1;min-width:0;}
.dc-actions-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--n200);background:var(--white);border-radius:var(--r-full);
  padding:7px 8px 7px 13px;font-size:12px;font-weight:700;color:var(--n700);cursor:pointer;transition:all .15s;flex-shrink:0;}
.dc-actions-pill:hover{border-color:var(--orange);color:var(--orange-dark);}
.dc-actions-pill .cnt{background:var(--orange-subtle);color:var(--orange-dark);border-radius:var(--r-full);min-width:20px;height:20px;padding:0 6px;display:grid;place-items:center;font-size:11px;}
.dc-actions-pill .chev{width:16px;height:16px;transition:transform .25s;}
.dcard.open .dc-actions-pill .chev{transform:rotate(180deg);}
.dc-summary{display:flex;flex-wrap:wrap;gap:12px 26px;padding:0 20px 16px;}
.dc-cell{display:flex;flex-direction:column;gap:5px;min-width:0;}
.dc-cell .k{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--n400);}
.dc-cell .v{font-size:13px;font-weight:600;color:var(--n800);display:flex;align-items:center;}

/* compact stage */
.cstage{display:flex;flex-direction:column;gap:5px;}
.cstage .segs{display:flex;gap:3px;}
.cstage .seg{width:22px;height:5px;border-radius:var(--r-full);background:var(--n200);}
.cstage .seg.done{background:var(--success);}
.cstage .seg.cur{background:var(--orange);}
.cstage .lbl{font-size:11.5px;font-weight:600;color:var(--n700);}
.cstage .lbl small{color:var(--n400);font-weight:500;}

/* expand-in-place action table */
.dc-expand{max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(0,0,.2,1);}
.dcard.open .dc-expand{max-height:720px;}
.dc-expand-inner{border-top:1px solid var(--n100);padding:14px 20px 18px;}
.atable{width:100%;border-collapse:collapse;}
.atable th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--n400);padding:6px 10px;border-bottom:1px solid var(--n100);}
.atable td{padding:10px;border-bottom:1px solid var(--n100);font-size:12.5px;vertical-align:middle;}
.atable tr:last-child td{border-bottom:none;}
.atable tbody tr{transition:background .12s;}
.atable tbody tr:hover{background:var(--n50);}
.atable td.task{font-weight:600;color:var(--n800);}
.atable tr.done td.task{text-decoration:line-through;color:var(--n400);}
.acheck{width:17px;height:17px;accent-color:var(--success);cursor:pointer;}
.empty-actions{display:flex;align-items:center;gap:9px;color:var(--success);font-weight:600;font-size:13px;padding:10px 4px;}
.empty-actions svg{width:18px;height:18px;}

/* ── Detail ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--n600);font-weight:600;font-size:12.5px;cursor:pointer;padding:6px 8px;border-radius:var(--r-base);margin-bottom:6px;}
.back-btn:hover{background:var(--n100);color:var(--n900);}
.back-btn svg{width:16px;height:16px;}
.detail-head{background:var(--white);border:1px solid var(--n200);border-radius:var(--r-2xl);box-shadow:var(--sh-2);padding:22px 24px;margin-bottom:16px;}
.dh-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;}
.dh-top .ref{font-size:11px;color:var(--n400);font-weight:600;}
.dh-top h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:3px 0 0;}
.dh-meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px;}
.dh-meta .k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);display:block;}
.dh-meta .v{font-size:13px;font-weight:600;color:var(--n800);}
.rollup{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex-shrink:0;}
.rollup .lab{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;}

/* full stage bar */
.stagebar{display:flex;align-items:flex-start;margin-top:4px;}
.stagenode{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.stagenode .knob{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--white);border:2px solid var(--n200);color:var(--n300);z-index:2;transition:all .2s;}
.stagenode .knob svg{width:15px;height:15px;}
.stagenode.complete .knob{background:var(--success);border-color:var(--success);color:#fff;}
.stagenode.current .knob{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 0 5px var(--orange-subtle);}
.stagenode .slabel{font-size:11px;font-weight:600;color:var(--n500);margin-top:8px;text-align:center;max-width:92px;}
.stagenode.current .slabel{color:var(--orange-dark);font-weight:700;}
.stagenode.complete .slabel{color:var(--n700);}
.stageconn{position:absolute;top:14px;left:50%;width:100%;height:3px;background:var(--n200);z-index:1;}
.stageconn.done{background:var(--success);}

/* section cards */
.sec{background:var(--white);border:1px solid var(--n200);border-radius:var(--r-xl);box-shadow:var(--sh-1);margin-bottom:14px;transition:box-shadow .2s;}
.sec.flash{animation:flash 1.1s ease;}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(255,164,38,.0);}25%{box-shadow:0 0 0 4px rgba(255,164,38,.45);}100%{box-shadow:var(--sh-1);}}
.sec-head{display:flex;align-items:center;gap:12px;padding:15px 20px;}
.sec-head h3{font-size:14.5px;font-weight:700;margin:0;}
.sec-head .sp{flex:1;}
.sec-body{padding:0 20px 18px;color:var(--n700);font-size:13px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;}
.fgrid .k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);}
.fgrid .v{font-size:13.5px;font-weight:600;color:var(--n800);margin-top:2px;}
.review-btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r-full);padding:7px 14px;font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid var(--n200);background:var(--white);color:var(--n700);transition:all .15s;}
.review-btn:hover{border-color:var(--success);color:var(--success);}
.review-btn.done{background:var(--success-bg);color:var(--success);border-color:transparent;cursor:default;}
.review-btn svg{width:14px;height:14px;}
.ovf{width:32px;height:32px;border-radius:var(--r-base);border:none;background:transparent;color:var(--n500);cursor:pointer;display:grid;place-items:center;}
.ovf:hover{background:var(--n100);}
.ovf svg{width:18px;height:18px;}
.sec.excluded{opacity:.5;}
.sec.excluded .sec-body::after{content:'Excluded from this demand';display:block;color:var(--n400);font-style:italic;font-size:12px;margin-top:8px;}

/* tabs (F6) */
.tabstrip{display:flex;gap:4px;border-bottom:1px solid var(--n150);padding:0 20px;}
.tab{position:relative;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--n600);padding:13px 10px;display:inline-flex;align-items:center;gap:7px;}
.tab:hover{color:var(--n800);}
.tab.on{color:var(--orange-dark);}
.tab.on::after{content:'';position:absolute;left:6px;right:6px;bottom:-1px;height:2px;background:var(--orange);border-radius:2px;}
.tab .badge{background:var(--n100);color:var(--n600);font-size:10px;font-weight:700;border-radius:var(--r-full);padding:1px 7px;min-width:18px;text-align:center;}
.tab.on .badge{background:var(--orange-subtle);color:var(--orange-dark);}
.tabpanel{padding:18px 20px;}

/* ── popover (Customize) ── */
.pop{position:absolute;z-index:60;background:var(--white);border:1px solid var(--n200);border-radius:var(--r-lg);box-shadow:var(--sh-4);padding:8px;min-width:210px;}
.pop .pop-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;padding:8px 10px 6px;}
.pop label{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-base);font-size:13px;font-weight:500;color:var(--n800);cursor:pointer;}
.pop label:hover{background:var(--n100);}
.pop input{width:16px;height:16px;accent-color:var(--orange);cursor:pointer;}

/* ── modal ── */
.overlay{position:fixed;inset:0;background:rgba(20,22,30,.42);backdrop-filter:blur(2px);z-index:80;display:none;align-items:center;justify-content:center;padding:24px;}
.overlay.open{display:flex;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--white);border-radius:var(--r-2xl);box-shadow:var(--sh-4);width:min(460px,94vw);overflow:hidden;animation:pop .26s cubic-bezier(.34,1.35,.5,1);}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{padding:20px 22px 4px;}
.modal-head h3{margin:0;font-size:17px;font-weight:800;letter-spacing:-.01em;}
.modal-head p{margin:5px 0 0;font-size:12.5px;color:var(--n500);}
.modal-body{padding:16px 22px;}
.modal-body .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;margin:6px 0 8px;}
.opt{display:flex;align-items:center;gap:11px;padding:9px 0;font-size:13.5px;font-weight:500;cursor:pointer;}
.opt input{width:16px;height:16px;accent-color:var(--orange);}
.radios{display:flex;gap:10px;}
.radios .opt{padding:9px 14px;border:1px solid var(--n200);border-radius:var(--r-full);flex:1;justify-content:center;}
.modal-foot{padding:14px 22px 20px;display:flex;justify-content:flex-end;gap:10px;}

/* ── Tango drawer ── */
.drawer{position:fixed;top:0;right:0;height:100vh;width:372px;max-width:92vw;background:var(--white);box-shadow:-12px 0 44px rgba(20,24,40,.16);
  z-index:90;transform:translateX(100%);transition:transform .3s cubic-bezier(0,0,.2,1);display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.dr-head{padding:16px 18px;border-bottom:1px solid var(--n100);display:flex;align-items:center;gap:10px;}
.dr-spark{width:30px;height:30px;border-radius:var(--r-base);background:var(--gradient-ai);display:grid;place-items:center;color:#fff;flex-shrink:0;}
.dr-spark svg{width:17px;height:17px;}
.dr-head .who{font-weight:800;font-size:15px;}
.dr-head .acted{font-size:10px;color:var(--purple);background:var(--purple-bg);border-radius:var(--r-full);padding:3px 9px;font-weight:700;margin-top:1px;display:inline-block;}
.dr-head .sp{flex:1;}
.dr-x{width:32px;height:32px;border:none;background:transparent;color:var(--n500);border-radius:var(--r-base);cursor:pointer;display:grid;place-items:center;}
.dr-x:hover{background:var(--n100);}
.dr-x svg{width:18px;height:18px;}
.dr-body{flex:1;overflow-y:auto;padding:16px;}
.gate{background:var(--purple-bg);border:1px solid #ece7fd;border-radius:var(--r-lg);padding:15px 16px;margin-bottom:16px;}
.gate .state{font-size:13px;color:var(--n700);font-weight:600;margin-bottom:3px;}
.gate .must{font-size:12px;color:var(--n600);margin-bottom:11px;}
.gate .must b{color:var(--orange-dark);}
.gitem{display:flex;align-items:flex-start;gap:10px;padding:8px 0;cursor:pointer;border-radius:var(--r-base);}
.gitem:hover{background:rgba(255,255,255,.6);}
.gitem .gck{width:19px;height:19px;border-radius:50%;border:2px solid var(--n300);flex-shrink:0;margin-top:1px;display:grid;place-items:center;transition:all .2s;}
.gitem .gck svg{width:12px;height:12px;color:#fff;opacity:0;}
.gitem.sat .gck{background:var(--success);border-color:var(--success);}
.gitem.sat .gck svg{opacity:1;}
.gitem .gtx{font-size:12.5px;font-weight:600;color:var(--n800);}
.gitem.sat .gtx{color:var(--n400);text-decoration:line-through;font-weight:500;}
.gitem:not(.sat) .gtx{color:var(--info);}
.gate-advance{margin-top:12px;width:100%;justify-content:center;}
.insight-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--n400);font-weight:700;margin:4px 0 10px;}
.insight{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--n100);}
.insight .idot{width:26px;height:26px;border-radius:var(--r-base);background:var(--orange-subtle);color:var(--orange-dark);display:grid;place-items:center;flex-shrink:0;}
.insight .idot svg{width:15px;height:15px;}
.insight p{margin:0;font-size:12.5px;color:var(--n700);line-height:1.5;}
.dr-foot{padding:13px 16px;border-top:1px solid var(--n100);}
.prompts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px;}
.prompt{font-size:11.5px;font-weight:600;color:var(--n700);background:var(--white);border:1px solid var(--n200);border-radius:var(--r-full);padding:6px 12px;cursor:pointer;transition:all .15s;}
.prompt:hover{border-color:var(--purple);color:var(--purple);}
.ask{display:flex;align-items:center;gap:8px;border-radius:var(--r-full);padding:3px 3px 3px 16px;background:var(--white);position:relative;}
.ask::before{content:'';position:absolute;inset:0;border-radius:var(--r-full);padding:1.5px;background:var(--gradient-ai);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.ask input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:13px;padding:9px 0;}
.ask .send{width:34px;height:34px;border-radius:50%;border:none;background:var(--gradient-ai);color:#fff;cursor:pointer;display:grid;place-items:center;flex-shrink:0;}
.ask .send svg{width:16px;height:16px;}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--n900);color:#fff;font-size:12.5px;font-weight:600;
  padding:11px 20px;border-radius:var(--r-full);box-shadow:var(--sh-4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

<script>
// ═══════════════════════ DATA ═══════════════════════
const PEOPLE = {

const STAGES = ['Intake','Evaluation','Scope & Solutioning','Approval','Fulfilment'];

const DEMANDS = [

  { id:'DMD0001664', title:'EMEIA Cloud Cost Optimization', priority:'High', portfolio:'Finance',
    totalCost:480000, budget:300000, manager:'CB', creator:'JS', stage:1, hoursInStage:7,
    sections:[
      {key:'details',name:'Details',readiness:'reviewed'},
      {key:'problem',name:'Problem Statement',readiness:'reviewed'},
      {key:'objectives',name:'Objectives',readiness:'action'},
      {key:'ownership',name:'Ownership',readiness:'pending'},
      {key:'financials',name:'Financials',readiness:'incomplete'}],
    actions:[
      {id:'b1',priority:'High',task:'Confirm FinOps baseline figures',due:'Jun 23',assignee:'U',section:'Financials',status:'To Do',creator:'JS'},
      {id:'b2',priority:'High',task:'Approve target savings model',due:'Jun 26',assignee:'CB',section:'Business Case',status:'In Progress',creator:'JS'},
      {id:'b3',priority:'Medium',task:'Map impacted cost centres',due:'Jun 28',assignee:'JS',section:'Scope',status:'To Do',creator:'JS'}] },

  { id:'DMD0001665', title:'APAC Customer Data Platform', priority:'High', portfolio:'Technology',
    totalCost:750000, budget:520000, manager:'JS', creator:'AM', stage:0, hoursInStage:4,
    sections:[
      {key:'details',name:'Details',readiness:'action'},
      {key:'problem',name:'Problem Statement',readiness:'incomplete'},
      {key:'objectives',name:'Objectives',readiness:'incomplete'},
      {key:'ownership',name:'Ownership',readiness:'incomplete'},
      {key:'financials',name:'Financials',readiness:'incomplete'}],
    actions:[
      {id:'c1',priority:'High',task:'Complete intake details',due:'Jun 22',assignee:'AM',section:'Details',status:'In Progress',creator:'AM'},
      {id:'c2',priority:'Medium',task:'Identify data-residency constraints',due:'Jun 27',assignee:'U',section:'Scope',status:'To Do',creator:'AM'}] },

  { id:'DMD0001666', title:'Global HR Service Desk AI', priority:'Low', portfolio:'Operations',
    totalCost:90000, budget:90000, manager:'MR', creator:'CB', stage:3, hoursInStage:32,
    sections:[
      {key:'details',name:'Details',readiness:'reviewed'},
      {key:'problem',name:'Problem Statement',readiness:'reviewed'},
      {key:'objectives',name:'Objectives',readiness:'reviewed'},
      {key:'ownership',name:'Ownership',readiness:'reviewed'},
      {key:'financials',name:'Financials',readiness:'reviewed'}],
    actions:[
      {id:'d1',priority:'Medium',task:'Circulate approval pack to steering group',due:'Jun 20',assignee:'MR',section:'Approval',status:'Completed',creator:'CB'}] },

  { id:'DMD0001667', title:'Zero-Trust Network Rollout', priority:'Medium', portfolio:'Security',
    totalCost:360000, budget:250000, manager:'AM', creator:'JS', stage:2, hoursInStage:12,
    sections:[
      {key:'details',name:'Details',readiness:'reviewed'},
      {key:'problem',name:'Problem Statement',readiness:'reviewed'},

    actions:[
      {id:'e1',priority:'High',task:'Resolve identity-provider dependency',due:'Jun 25',assignee:'U',section:'Scope',status:'To Do',creator:'JS'},
      {id:'e2',priority:'Medium',task:'Draft phased rollout plan',due:'Jun 29',assignee:'AM',section:'Scope',status:'In Progress',creator:'JS'},
      {id:'e3',priority:'Low',task:'Schedule security review board',due:'Jul 2',assignee:'CB',section:'Approval',status:'To Do',creator:'JS'},
      {id:'e4',priority:'Medium',task:'Confirm vendor SOW',due:'Jul 3',assignee:'JS',section:'Financials',status:'To Do',creator:'JS'}] },

  { id:'DMD0001668', title:'Supply Chain Tower Analytics', priority:'High', portfolio:'Operations',
    totalCost:610000, budget:410000, manager:'CB', creator:'MR', stage:4, hoursInStage:60,
    sections:[
      {key:'details',name:'Details',readiness:'reviewed'},
      {key:'problem',name:'Problem Statement',readiness:'reviewed'},
      {key:'objectives',name:'Objectives',readiness:'reviewed'},
      {key:'ownership',name:'Ownership',readiness:'reviewed'},
      {key:'financials',name:'Financials',readiness:'pending'}],
    actions:[
      {id:'f1',priority:'Medium',task:'Confirm go-live runbook owner',due:'Jun 24',assignee:'U',section:'Fulfilment',status:'To Do',creator:'MR'}] }
];

// ═══════════════════════ helpers ═══════════════════════
const el = id => document.getElementById(id);
const money = n => '$'+n.toLocaleString('en-US');
const D = id => DEMANDS.find(d=>d.id===id);
const openCount = d => d.actions.filter(a=>a.status!=='Completed').length;
const PRI = {High:'c-high',Medium:'c-med',Low:'c-low'};
const STAT = {'To Do':'c-todo','In Progress':'c-prog','Completed':'c-done'};
const READ = {incomplete:['c-incomplete','Incomplete'],action:['c-action','Action Required'],pending:['c-pending','Pending Review'],reviewed:['c-reviewed','Reviewed']};

function priChip(p){ return '<span class="chip '+PRI[p]+'"><span class="dot" style="background:currentColor"></span>'+p+'</span>'; }
function statChip(s){ return '<span class="chip '+STAT[s]+'">'+s+'</span>'; }
function secChip(s){ return '<span class="chip c-section">'+s+'</span>'; }
function readChip(r){ return '<span class="chip '+READ[r][0]+'">'+READ[r][1]+'</span>'; }
function av(pid,withName){ var p=PEOPLE[pid]; return '<span class="av'+(pid==='U'?' un':'')+'"><span class="ring" style="background:'+p.c+'">'+p.av+'</span>'+(withName?'<span class="nm">'+p.name+'</span>':'')+'</span>'; }

function compactStage(d){
  var segs='';
  for(var i=0;i<STAGES.length;i++){ var cls=i<d.stage?'done':(i===d.stage?'cur':''); segs+='<span class="seg '+cls+'"></span>'; }
  return '<div class="cstage"><div class="segs">'+segs+'</div><div class="lbl">'+STAGES[d.stage]+' <small>· '+d.hoursInStage+'h in stage</small></div></div>';
}

// ═══════════════════════ STATE ═══════════════════════
var COLS = {priority:true,portfolio:true,totalCost:true,budget:true,manager:true,creator:true,status:true};
var COLDEF = [['priority','Priority'],['portfolio','Portfolio'],['totalCost','Total Cost'],['budget','Budget'],['manager','Manager'],['creator','Creator'],['status','Status']];
var expanded = new Set();
var activeId = null;          // demand in Detail / Tango context
var tangoActions = 12;
var activeTab = 'overview';
var gridSearch = '';
var gridPri = 'All';
var chatDemand = null;        // demand whose Tango chat is currently shown

// ═══════════════════════ F1 GRID ═══════════════════════
function cell(k,v){ return '<div class="dc-cell"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }

function demandCard(d){
  var open=openCount(d);
  var cells='';
  if(COLS.priority) cells+=cell('Priority',priChip(d.priority));
  if(COLS.portfolio) cells+=cell('Portfolio',d.portfolio);
  if(COLS.totalCost) cells+=cell('Total Cost',money(d.totalCost));
  if(COLS.budget) cells+=cell('Budget',money(d.budget));
  if(COLS.manager) cells+=cell('Manager',av(d.manager,true));
  if(COLS.creator) cells+=cell('Creator',av(d.creator,true));
  if(COLS.status) cells+=cell('Status',compactStage(d));

  var rows='';
  if(d.actions.length===0){
    rows='<div class="empty-actions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>No open actions — all clear</div>';
  } else {
    var body=d.actions.map(function(a){
      var done=a.status==='Completed';
      return '<tr class="'+(done?'done':'')+'">'
        +'<td><input type="checkbox" class="acheck" '+(done?'checked':'')+' onchange="checkAction(\''+d.id+'\',\''+a.id+'\')"></td>'
        +'<td>'+priChip(a.priority)+'</td>'
        +'<td class="task">'+a.task+'</td>'
        +'<td>'+a.due+'</td>'
        +'<td><button class="assign-btn" onclick="assignMenu(event,\''+d.id+'\',\''+a.id+'\')">'+av(a.assignee,true)+'</button></td>'
        +'<td>'+secChip(a.section)+'</td>'
        +'<td>'+statChip(a.status)+'</td>'
        +'<td>'+av(a.creator,true)+'</td></tr>';
    }).join('');
    rows='<table class="atable"><thead><tr><th></th><th>Priority</th><th>Task</th><th>Due</th><th>Assigned to</th><th>Section</th><th>Status</th><th>Created by</th></tr></thead><tbody>'+body+'</tbody></table>';
  }

  return '<div class="dcard'+(expanded.has(d.id)?' open':'')+'" id="card-'+d.id+'">'
    +'<div class="dcard-head">'
      +'<div class="dc-headmain"><div class="dc-ref">'+d.id+'</div><div class="dc-title" onclick="openDetail(\''+d.id+'\')">'+d.title+'</div></div>'
      +'<button class="dc-actions-pill" onclick="toggleExpand(\''+d.id+'\')"><span class="cnt">'+open+'</span> Actions'
        +'<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>'
    +'</div>'
    +'<div class="dc-summary">'+cells+'</div>'
    +'<div class="dc-expand"><div class="dc-expand-inner">'+rows+'</div></div>'
  +'</div>';
}

function visibleDemands(){
  return DEMANDS.filter(function(d){
    if(gridPri!=='All' && d.priority!==gridPri) return false;
    if(gridSearch && (d.title+' '+d.id).toLowerCase().indexOf(gridSearch.toLowerCase())<0) return false;
    return true;
  });
}
function renderGrid(){
  var list=visibleDemands();
  el('grid-list').innerHTML = list.length ? list.map(demandCard).join('') : '<div class="empty-grid">No demands match your search or filter.</div>';
  el('grid-count').textContent = DEMANDS.length+' active · '+DEMANDS.reduce((s,d)=>s+openCount(d),0)+' open actions';
}
function setSearch(v){ gridSearch=v; renderGrid(); }
function setPri(p,btn){ gridPri=p; [].forEach.call(el('prifilter').children,b=>b.classList.remove('on')); btn.classList.add('on'); renderGrid(); }
function toggleExpand(id){ if(expanded.has(id))expanded.delete(id); else expanded.add(id);
  el('card-'+id).classList.toggle('open'); }
function checkAction(did,aid){
  var d=D(did), a=d.actions.find(x=>x.id===aid);
  a.status = a.status==='Completed' ? 'To Do' : 'Completed';
  renderGrid();
  if(a.status==='Completed') toast('Action completed');
  if(el('tango').classList.contains('open') && activeId===did) renderTango();
}

// ═══════════════════════ F5 CUSTOMIZE ═══════════════════════
function toggleCustomize(e){
  e.stopPropagation();
  if(el('customize-pop')){ el('customize-pop').remove(); return; }
  var pop=document.createElement('div'); pop.className='pop'; pop.id='customize-pop';
  pop.innerHTML='<div class="pop-title">Summary columns</div>'+COLDEF.map(function(c){
    return '<label><input type="checkbox" '+(COLS[c[0]]?'checked':'')+' onchange="setCol(\''+c[0]+'\',this.checked)"> '+c[1]+'</label>';
  }).join('');
  var r=el('customize-btn').getBoundingClientRect();
  pop.style.top=(r.bottom+window.scrollY+8)+'px'; pop.style.left=(r.left+window.scrollX)+'px';
  document.body.appendChild(pop);
}
function setCol(k,v){ COLS[k]=v; renderGrid(); }

// ═══════════════════════ DETAIL + F2/F4/F6 ═══════════════════════
function rollup(d){ return d.sections.every(s=>s.readiness==='reviewed') ? 'complete':'incomplete'; }

function fullStageBar(d){
  var nodes='';
  for(var i=0;i<STAGES.length;i++){
    var cls=i<d.stage?'complete':(i===d.stage?'current':'upcoming');
    var conn = i>0 ? '<div class="stageconn '+(i<=d.stage?'done':'')+'"></div>' : '';
    var knob = i<d.stage ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>' : (i===d.stage?'<span style="width:9px;height:9px;border-radius:50%;background:#fff"></span>':'');
    nodes+='<div class="stagenode '+cls+'">'+conn+'<div class="knob">'+knob+'</div><div class="slabel">'+STAGES[i]+'</div></div>';
  }
  return '<div class="stagebar">'+nodes+'</div>';
}

const SECCONTENT = {
  details:d=>'<div class="fgrid"><div><div class="k">Demand ref</div><div class="v">'+d.id+'</div></div><div><div class="k">Portfolio</div><div class="v">'+d.portfolio+'</div></div><div><div class="k">Requested by</div><div class="v">'+PEOPLE[d.creator].name+'</div></div><div><div class="k">Demand manager</div><div class="v">'+PEOPLE[d.manager].name+'</div></div></div>',
  problem:d=>'<p>Current staffing forecasts are produced in spreadsheets and lag demand by 4–6 weeks, causing over- and under-allocation across engagements. This demand seeks a predictive planning capability to close that gap.</p>',
  objectives:d=>'<p>Reduce planning latency to under one week, improve allocation accuracy by 20%, and give engagement leads a self-serve view of projected capacity.</p>',
  ownership:d=>'<div class="fgrid"><div><div class="k">Accountable</div><div class="v">'+PEOPLE[d.manager].name+'</div></div><div><div class="k">Sponsor</div><div class="v">'+PEOPLE[d.creator].name+'</div></div></div>',
  financials:d=>'<div class="fgrid"><div><div class="k">Total cost</div><div class="v">'+money(d.totalCost)+'</div></div><div><div class="k">Approved budget</div><div class="v">'+money(d.budget)+'</div></div><div><div class="k">Variance</div><div class="v">'+money(d.totalCost-d.budget)+'</div></div></div>'
};

function sectionCard(d,s){
  var rb = s.readiness==='reviewed'
    ? '<button class="review-btn done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>Reviewed</button>'
    : '<button class="review-btn" onclick="markReviewed(\''+d.id+'\',\''+s.key+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Mark as Reviewed</button>';
  return '<div class="sec" id="sec-'+s.key+'"><div class="sec-head"><h3>'+s.name+'</h3>'+readChip(s.readiness)+'<span class="sp"></span>'
    +rb
    +'<button class="ovf" onclick="sectionMenu(event,\''+d.id+'\',\''+s.key+'\')"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>'
    +'</div><div class="sec-body">'+(SECCONTENT[s.key]?SECCONTENT[s.key](d):'<p>—</p>')+'</div></div>';
}

function outlineTabs(d){
  var counts={overview:4,strategy:3,ownership:2,financials:5};
  var tabs=[['overview','Overview'],['strategy','Strategy'],['ownership','Ownership'],['financials','Financials']];
  var strip=tabs.map(function(t){ return '<button class="tab'+(activeTab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'<span class="badge">'+counts[t[0]]+'</span></button>'; }).join('');
  var panels={
    overview:'<div class="fgrid"><div><div class="k">Title</div><div class="v">'+d.title+'</div></div><div><div class="k">Portfolio</div><div class="v">'+d.portfolio+'</div></div><div><div class="k">Priority</div><div class="v">'+priChip(d.priority)+'</div></div><div><div class="k">Current stage</div><div class="v">'+STAGES[d.stage]+'</div></div></div>',
    strategy:'<p>Aligns to the FY26 operational-efficiency pillar. Expected to contribute to the “reduce delivery friction” corporate objective with measurable cycle-time impact.</p>',
    ownership:'<div class="fgrid"><div><div class="k">Manager</div><div class="v">'+av(d.manager,true)+'</div></div><div><div class="k">Creator</div><div class="v">'+av(d.creator,true)+'</div></div></div>',
    financials:'<div class="fgrid"><div><div class="k">Total cost</div><div class="v">'+money(d.totalCost)+'</div></div><div><div class="k">Budget</div><div class="v">'+money(d.budget)+'</div></div><div><div class="k">Variance</div><div class="v">'+money(d.totalCost-d.budget)+'</div></div><div><div class="k">Funding</div><div class="v">Opex</div></div><div><div class="k">FY</div><div class="v">FY26</div></div></div>'
  };
  return '<div class="sec"><div class="sec-head"><h3>Request Outline</h3><span class="sp"></span><button class="ovf" onclick="sectionMenu(event,\''+d.id+'\',\'outline\')"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button></div>'
    +'<div class="tabstrip">'+strip+'</div><div class="tabpanel" id="outline-panel">'+panels[activeTab]+'</div></div>';
}
function setTab(t){ activeTab=t; el('view-detail').querySelector('.tabstrip').innerHTML =
  [['overview','Overview'],['strategy','Strategy'],['ownership','Ownership'],['financials','Financials']].map(function(x){var counts={overview:4,strategy:3,ownership:2,financials:5};return '<button class="tab'+(t===x[0]?' on':'')+'" onclick="setTab(\''+x[0]+'\')">'+x[1]+'<span class="badge">'+counts[x[0]]+'</span></button>';}).join('');
  renderDetail(D(activeId), true); }

function renderDetail(d, panelOnly){
  activeId=d.id;
  if(panelOnly){ // only refresh outline panel content
    var panels={overview:'<div class="fgrid"><div><div class="k">Title</div><div class="v">'+d.title+'</div></div><div><div class="k">Portfolio</div><div class="v">'+d.portfolio+'</div></div><div><div class="k">Priority</div><div class="v">'+priChip(d.priority)+'</div></div><div><div class="k">Current stage</div><div class="v">'+STAGES[d.stage]+'</div></div></div>',
      strategy:'<p>Aligns to the FY26 operational-efficiency pillar. Expected to contribute to the “reduce delivery friction” corporate objective with measurable cycle-time impact.</p>',
      ownership:'<div class="fgrid"><div><div class="k">Manager</div><div class="v">'+av(d.manager,true)+'</div></div><div><div class="k">Creator</div><div class="v">'+av(d.creator,true)+'</div></div></div>',
      financials:'<div class="fgrid"><div><div class="k">Total cost</div><div class="v">'+money(d.totalCost)+'</div></div><div><div class="k">Budget</div><div class="v">'+money(d.budget)+'</div></div><div><div class="k">Variance</div><div class="v">'+money(d.totalCost-d.budget)+'</div></div><div><div class="k">Funding</div><div class="v">Opex</div></div><div><div class="k">FY</div><div class="v">FY26</div></div></div>'};
    el('outline-panel').innerHTML=panels[activeTab]; return;
  }
  var ru=rollup(d);
  var html='<button class="back-btn" onclick="showGrid()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Back to demands</button>'
    +'<div class="detail-head"><div class="dh-top">'
      +'<div><div class="ref">'+d.id+'</div><h2>'+d.title+'</h2>'
        +'<div class="dh-meta"><div><span class="k">Priority</span><span class="v">'+priChip(d.priority)+'</span></div>'
        +'<div><span class="k">Portfolio</span><span class="v">'+d.portfolio+'</span></div>'
        +'<div><span class="k">Total cost</span><span class="v">'+money(d.totalCost)+'</span></div>'
        +'<div><span class="k">Manager</span><span class="v">'+av(d.manager,true)+'</span></div></div></div>'
      +'<div class="rollup"><span class="lab">Outline</span>'+(ru==='complete'?'<span class="chip c-complete">Complete</span>':'<span class="chip c-incomplete">Incomplete</span>')
        +'<button class="btn btn-secondary" style="margin-top:4px" onclick="openTango()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.9L21 11l-6.8 2.1L12 20l-2.2-6.9L3 11l6.8-2.1z"/></svg>Open Tango</button></div>'
    +'</div>'+fullStageBar(d)+'</div>'
    + outlineTabs(d)
    + d.sections.map(s=>sectionCard(d,s)).join('');
  el('view-detail').innerHTML=html;
}

function openDetail(id){ renderDetail(D(id)); el('view-grid').classList.add('hidden'); el('view-detail').classList.remove('hidden'); window.scrollTo(0,0);
  if(el('tango').classList.contains('open')) renderTango(); }
function showGrid(){ el('view-detail').classList.add('hidden'); el('view-grid').classList.remove('hidden'); }

function markReviewed(did,key){
  var d=D(did), s=d.sections.find(x=>x.key===key); s.readiness='reviewed';
  renderDetail(d); toast(s.name+' marked as reviewed');
  var node=el('sec-'+key); if(node){ node.classList.add('flash'); }
  if(el('tango').classList.contains('open') && activeId===did) renderTango();
}

// section overflow menu (F7)
function sectionMenu(e,did,key){
  e.stopPropagation();
  closeMenus();
  var m=document.createElement('div'); m.className='menu'; m.dataset.menu='1';
  m.innerHTML='<button onclick="createAction(\''+did+'\',\''+key+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Create an action</button>'
    +'<button onclick="excludeSection(\''+key+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Exclude this section</button>';
  var r=e.currentTarget.getBoundingClientRect();
  m.style.top=(r.bottom+window.scrollY+6)+'px'; m.style.left=(r.right-188+window.scrollX)+'px';
  document.body.appendChild(m);
}
function createAction(did,key){
  var d=D(did);
  d.actions.push({id:'n'+Date.now(),priority:'Medium',task:'New action for '+(d.sections.find(s=>s.key===key)||{name:'Outline'}).name,due:'Jul 5',assignee:'U',section:key.charAt(0).toUpperCase()+key.slice(1),status:'To Do',creator:'SD'});
  closeMenus(); toast('Action added'); tangoActed();
  if(el('tango').classList.contains('open')) renderTango();
}
function excludeSection(key){ var n=el('sec-'+key); if(n)n.classList.toggle('excluded'); closeMenus(); toast('Section excluded'); }

// inline owner assignment on action rows
function assignMenu(e,did,aid){
  e.stopPropagation(); closeMenus();
  var m=document.createElement('div'); m.className='menu'; m.dataset.menu='1';
  m.innerHTML=Object.keys(PEOPLE).map(function(pid){ return '<button onclick="assignTo(\''+did+'\',\''+aid+'\',\''+pid+'\')">'+av(pid,true)+'</button>'; }).join('');
  var r=e.currentTarget.getBoundingClientRect();
  m.style.top=(r.bottom+window.scrollY+6)+'px'; m.style.left=(r.left+window.scrollX)+'px';
  document.body.appendChild(m);
}
function assignTo(did,aid,pid){
  var a=D(did).actions.find(x=>x.id===aid); a.assignee=pid; closeMenus(); renderGrid();
  toast(pid==='U'?'Action unassigned':'Assigned to '+PEOPLE[pid].name); if(pid!=='U') tangoActed();
  if(el('tango').classList.contains('open') && activeId===did) renderTango();
}

// ═══════════════════════ F8 TANGO + F3 GATE ═══════════════════════
function gateItems(d){
  // Stable checklist: the first 3 sections + a high-priority-actions gate.
  // Items tick green as their underlying state is satisfied.
  var items = d.sections.slice(0,3).map(function(s){
    return {label:'Review the '+s.name+' section', sat:s.readiness==='reviewed', key:s.key};
  });
  var hp=d.actions.filter(a=>a.priority==='High'&&a.status!=='Completed').length;
  items.push({label: hp>0 ? 'Resolve '+hp+' high-priority action'+(hp>1?'s':'') : 'High-priority actions resolved', sat:hp===0, type:'actions'});
  return items;
}
function renderTango(){
  var body=el('tango-body');
  if(!el('tango-context')) body.innerHTML='<div id="tango-context"></div><div id="tango-chat"></div>';
  var ctx=el('tango-context');
  if(chatDemand!==activeId){ chatDemand=activeId; el('tango-chat').innerHTML=''; }
  if(!activeId){ ctx.innerHTML='<div class="insight-h">Tango</div><p style="font-size:13px;color:var(--n600)">Open a demand to see its stage-gate and what unblocks the next stage. From the grid, click any demand title.</p>'; return; }
  var d=D(activeId);
  var items=gateItems(d);
  var nextStage = d.stage<STAGES.length-1 ? STAGES[d.stage+1] : null;
  var allSat = items.every(i=>i.sat);
  var gate='<div class="gate"><div class="state"><b>'+d.title+'</b> is in <b>'+STAGES[d.stage]+'</b>.</div>';
  if(nextStage){
    gate+='<div class="must">To move to <b>'+nextStage+'</b>, you must:</div>';
    gate+=items.map(function(it){
      return '<div class="gitem'+(it.sat?' sat':'')+'" onclick="gotoGate(\''+d.id+'\',\''+(it.key||'')+'\',\''+(it.type||'')+'\')"><span class="gck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg></span><span class="gtx">'+it.label+'</span></div>';
    }).join('');
    if(allSat) gate+='<button class="btn btn-primary gate-advance" onclick="advance(\''+d.id+'\')">Advance to '+nextStage+'</button>';
  } else {
    gate+='<div class="must">This demand is in the final stage — <b>Fulfilment</b>.</div>';
  }
  gate+='</div>';

  // insights (warm, specific)
  var unassigned=d.actions.filter(a=>a.assignee==='U'&&a.status!=='Completed').length;
  var unreviewed=d.sections.filter(s=>s.readiness!=='reviewed').length;
  var ins=[];
  if(unassigned>0) ins.push((unassigned)+' open action'+(unassigned>1?'s are':' is')+' unassigned — assign owners so '+STAGES[d.stage]+' isn’t blocked.');
  if(unreviewed>0) ins.push(unreviewed+' section'+(unreviewed>1?'s':'')+' still need review before this demand can advance. I can draft the missing content.');
  ins.push('This demand has been in '+STAGES[d.stage]+' for '+d.hoursInStage+'h — '+(d.hoursInStage>24?'longer than typical for its priority.':'on track for its priority.'));
  var insights='<div class="insight-h">Tango’s read on this demand</div>'+ins.slice(0,3).map(function(t){
    return '<div class="insight"><span class="idot"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.2 6.9L21 11l-6.8 2.1L12 20l-2.2-6.9L3 11l6.8-2.1z"/></svg></span><p>'+t+'</p></div>';
  }).join('');

  ctx.innerHTML=gate+insights;
}
function gotoGate(did,key,type){
  if(activeId!==did || el('view-detail').classList.contains('hidden')) openDetail(did);
  setTimeout(function(){
    if(key){ var n=el('sec-'+key); if(n){ n.scrollIntoView({behavior:'smooth',block:'center'}); n.classList.remove('flash'); void n.offsetWidth; n.classList.add('flash'); } }
    else if(type==='actions'){ window.scrollTo({top:0,behavior:'smooth'}); toast('Resolve the high-priority actions in the grid'); }
  },120);
}
function advance(did){ var d=D(did); if(d.stage<STAGES.length-1){ d.stage++; d.hoursInStage=0; tangoActed(); toast('Advanced to '+STAGES[d.stage]); renderDetail(d); renderGrid(); renderTango(); } }
function openTango(){ el('tango').classList.add('open'); renderTango(); }
function closeTango(){ el('tango').classList.remove('open'); }
function askTango(q){ if(!q||!q.trim())return; el('ask-input').value=''; appendChat('me',q); tangoActed();
  setTimeout(function(){ appendChat('tango',tangoAnswer(q)); }, 380); }
function appendChat(who,text){ var c=el('tango-chat'); if(!c){ renderTango(); c=el('tango-chat'); } if(!c)return;
  c.insertAdjacentHTML('beforeend','<div class="bub '+who+'">'+text+'</div>'); var b=el('tango-body'); b.scrollTop=b.scrollHeight; }
function tangoAnswer(q){
  var d=activeId?D(activeId):null; q=(q||'').toLowerCase();
  if(!d) return 'Open a demand and I’ll tell you exactly what’s blocking it and how to unblock the next stage.';
  var hp=d.actions.filter(a=>a.priority==='High'&&a.status!=='Completed');
  var un=d.actions.filter(a=>a.assignee==='U'&&a.status!=='Completed');
  var unrev=d.sections.filter(s=>s.readiness!=='reviewed');
  var next=STAGES[d.stage+1]||'Fulfilment';
  if(q.indexOf('block')>=0){
    if(hp.length) return '“'+d.title+'” is held up by '+hp.length+' open high-priority action'+(hp.length>1?'s':'')+', incl. “'+hp[0].task+'”. Clear '+(hp.length>1?'those':'it')+' to satisfy the '+next+' gate.';
    if(unrev.length) return 'Nothing high-priority is open — the blocker is review: '+unrev.length+' section'+(unrev.length>1?'s':'')+' still need sign-off before '+next+'.';
    return 'Good news — nothing is blocking this one. It’s ready to advance to '+next+'.';
  }
  if(q.indexOf('draft')>=0||q.indexOf('section')>=0||q.indexOf('missing')>=0){
    if(unrev.length) return 'I can draft '+unrev.slice(0,3).map(s=>s.name).join(', ')+' from the intake details and your portfolio norms, then leave it for your review.';
    return 'Every section is reviewed — there’s nothing left to draft here.';
  }
  if(q.indexOf('assign')>=0||q.indexOf('owner')>=0){
    if(un.length) return un.length+' open action'+(un.length>1?'s are':' is')+' unassigned. Want me to suggest owners by section and workload, then assign and notify them?';
    return 'All open actions already have owners — you’re on top of it.';
  }
  return 'On “'+d.title+'”: it’s in '+STAGES[d.stage]+' with '+openCount(d)+' open action'+(openCount(d)!==1?'s':'')+' and '+unrev.length+' section'+(unrev.length!==1?'s':'')+' awaiting review. Ask me to unblock it, draft the gaps, or assign owners.';
}
function tangoActed(){ tangoActions++; el('tango-acted').textContent=tangoActions+' actions taken'; }

// ═══════════════════════ F7 EXPORT ═══════════════════════
function openExport(){ el('export-overlay').classList.add('open'); }
function closeExport(){ el('export-overlay').classList.remove('open'); }
function doExport(){
  var parts=[].slice.call(document.querySelectorAll('.exp-part:checked')).map(c=>c.value);
  var fmt=document.querySelector('input[name=fmt]:checked').value;
  closeExport(); toast('Exported '+parts.length+' section'+(parts.length!==1?'s':'')+' as '+fmt);
}

// ═══════════════════════ shared ═══════════════════════
function toast(msg){ var t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2100); }
function closeMenus(){ document.querySelectorAll('[data-menu]').forEach(m=>m.remove()); var p=el('customize-pop'); if(p)p.remove(); }

document.addEventListener('click',function(e){
  if(!e.target.closest('[data-menu]')&&!e.target.closest('.ovf')) document.querySelectorAll('[data-menu]').forEach(m=>m.remove());
  if(!e.target.closest('#customize-pop')&&!e.target.closest('#customize-btn')){ var p=el('customize-pop'); if(p)p.remove(); }
});
el('export-overlay').addEventListener('click',function(e){ if(e.target===this) closeExport(); });
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ if(el('export-overlay').classList.contains('open')) closeExport();
    else if(el('customize-pop')||document.querySelector('[data-menu]')) closeMenus();
    else if(el('tango').classList.contains('open')) closeTango(); }
});

// init
renderGrid();
</script>
</body>
</html>
